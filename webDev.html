<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Minimalist Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="logo">Calvin Glauser</div>
            <nav class="nav">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="music.html" class="nav-link">Music</a>
                <a href="webDev.html" class="nav-link">Skills</a>
                <a href="portfolio.html" class="nav-link">Portfolio</a>

            </nav>
        </div>
    </header>


    <main class="main-content">
        <section class="hero">
            <div class="container">
                <h1 class="hero-title">Get In Touch</h1>
                <p class="hero-subtitle">We'd love to hear from you</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="form-container">
                    <form class="contact-form" id="contactForm">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone">
                        </div>

                        <div class="form-group">
                            <label for="service">Service Type</label>
                            <select id="service" name="service" required>
                                <option value="">Select a service</option>
                                <option value="design">Design</option>
                                <option value="development">Development</option>
                                <option value="consulting">Consulting</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="6" required></textarea>
                        </div>

                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="subscribe" name="subscribe">
                            <label for="subscribe">Subscribe to our newsletter</label>
                        </div>

                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>
                </div>

                <div class="contact-info">
                    <h2>Contact Information</h2>
                    <p>Add your contact details here.</p>
                </div>
            </div>
        </section>
    </main>


    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Minimalist Studio. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
